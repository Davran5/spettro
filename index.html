<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spettro | German Engineering. Built for Uzbekistan.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Lenis Smooth Scroll Script -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.29/dist/lenis.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Oswald', 'sans-serif'],
            },
            colors: {
              spettro: {
                orange: '#FF5722',
                dark: '#050505',
                glass: 'rgba(255, 255, 255, 0.1)',
                border: 'rgba(255, 255, 255, 0.2)'
              }
            },
            backgroundImage: {
              'metal-gradient': 'linear-gradient(135deg, #2b2b2b 0%, #1a1a1a 50%, #000000 100%)',
            }
          }
        }
      }
    </script>
    <style>
      /* Remove native smooth scroll to avoid conflicts with Lenis */
      html {
        scroll-behavior: auto; 
      }
      
      body {
        background-color: #050505;
        color: white;
        overflow-x: hidden;
      }

      /* Lenis Recommended CSS */
      html.lenis, html.lenis body {
        height: auto;
      }
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      .lenis.lenis-stopped {
        overflow: hidden;
      }
      .lenis.lenis-scrolling iframe {
        pointer-events: none;
      }

      /* Hide scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #FF5722;
      }
      .clip-text-image {
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }
    </style>
