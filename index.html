<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spettro Uzbekistan</title>
    <link rel="icon" type="image/webp" href="/logo_s.webp" />
    <link rel="apple-touch-icon" href="/logo_s.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Lenis Smooth Scroll Script -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.29/dist/lenis.min.js"></script>

    <style>
      /* Remove native smooth scroll to avoid conflicts with Lenis */
      html {
        scroll-behavior: auto; 
      }
      
      body {
        background-color: #050505;
        color: white;
        overflow-x: hidden;
      }

      /* Lenis Recommended CSS */
      html.lenis, html.lenis body {
        height: auto;
      }
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      .lenis.lenis-stopped {
        overflow: hidden;
      }
      .lenis.lenis-scrolling iframe {
        pointer-events: none;
      }

      /* Hide scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #FF5722;
      }
      .clip-text-image {
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }
      .seo-static-content {
        background: #050505;
        color: #ffffff;
        font-family: Inter, sans-serif;
        padding: 96px 24px 48px;
      }
      .seo-static-content h1 {
        font-family: Oswald, sans-serif;
        font-size: clamp(36px, 8vw, 72px);
        line-height: 0.95;
        margin: 0 0 24px;
        text-transform: uppercase;
      }
      .seo-static-content p,
      .seo-static-content li {
        color: #d1d5db;
        font-size: 18px;
        line-height: 1.7;
        max-width: 920px;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
